name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Dummy values: the build and tests never connect to a database
    # (prisma generate + next build are offline; logic tests are pure).
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci?schema=public"
      JWT_SECRET: "ci-test-secret"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests (split & balance logic)
        run: npx tsx scripts/test-logic.ts

      - name: Production build
        run: npm run build
